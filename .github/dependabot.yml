version: 2

updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
    groups:
      gradle-dependencies:
        patterns:
          - "*"
    reviewers:
      - "robotsnh"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 5
    reviewers:
      - "robotsnh"