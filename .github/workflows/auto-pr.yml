name: Auto-PR to Main
on:
  push:
    branches:
      - dev

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request
        # This checks if a PR already exists so it doesn't error out on every push
        run: |
          existing_pr=$(gh pr list --head dev --base main --json number --jq '.[0].number')
          if [ -z "$existing_pr" ]; then
            gh pr create \
              --title "Sync dev to main" \
              --body "Automated PR created by GitHub Actions." \
              --base main \
              --head dev
          else
            echo "PR already exists: #$existing_pr"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}